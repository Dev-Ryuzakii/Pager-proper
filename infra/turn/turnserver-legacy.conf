# coturn — LEGACY instance (static long-term credentials)
#
# Serves the already-shipped Android APK / desktop builds, which have
# turn:<host>:3478 with user dilarion:dilarion2026 compiled in. Keep this
# instance running until those builds are out of circulation, then delete it.
#
# Rendered by install-coturn.sh: __REALM__ and __EXTERNAL_IP__ are substituted.

listening-port=3478
tls-listening-port=5349

listening-ip=0.0.0.0
# Public IP of the VPS. On a NAT'd provider use external-ip=PUBLIC/PRIVATE.
external-ip=__EXTERNAL_IP__

realm=__REALM__
server-name=__REALM__

fingerprint
lt-cred-mech
user=dilarion:dilarion2026

# Relay ports for this instance only — must not overlap the REST instance, which
# owns 49160-49500 (the single range the router forwards). Shipped builds reach
# this instance over TCP 3478, which is already forwarded.
min-port=49600
max-port=49700

# TLS (filled in when certbot certs exist; harmless if absent)
cert=/etc/coturn/certs/fullchain.pem
pkey=/etc/coturn/certs/privkey.pem
# TLSv1.0/1.1 and the weak suites off
no-tlsv1
no-tlsv1_1

# Hardening: never let a relay be pointed at private/loopback space, which
# would turn the TURN server into an internal-network port scanner.
no-multicast-peers
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.0.0.0-192.0.0.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=198.18.0.0-198.19.255.255
denied-peer-ip=::1
denied-peer-ip=fc00::-fdff:ffff:ffff:ffff:ffff:ffff:ffff:ffff
denied-peer-ip=fe80::-febf:ffff:ffff:ffff:ffff:ffff:ffff:ffff

# No CLI/telnet admin port open.
no-cli

# Abuse limits — a leaked static password is public, so cap what it can cost.
user-quota=12
total-quota=1200
bps-capacity=0
stale-nonce=600

log-file=/var/log/coturn/turnserver-legacy.log
simple-log
