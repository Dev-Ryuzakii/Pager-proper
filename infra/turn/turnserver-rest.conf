# coturn — REST instance (ephemeral HMAC credentials, TURN REST API)
#
# Used by new client builds, which call GET /webrtc/ice-servers on the backend
# and receive a username of the form "<expiry-unix>:<user>" plus an HMAC-SHA1
# password. Nothing reusable ships inside the binary.
#
# Runs as a SECOND coturn instance on its own ports: coturn does not honour
# static `user=` entries once use-auth-secret is on, so the legacy static
# credential needs its own process (turnserver-legacy.conf) on 3478.
#
# Rendered by install-coturn.sh: __REALM__, __EXTERNAL_IP__, __AUTH_SECRET__.

listening-port=3479
tls-listening-port=5350

listening-ip=0.0.0.0
external-ip=__EXTERNAL_IP__

realm=__REALM__
server-name=__REALM__

fingerprint
use-auth-secret
static-auth-secret=__AUTH_SECRET__

# Relay ports for this instance only — must not overlap the legacy instance.
min-port=49301
max-port=49500

cert=/etc/coturn/certs/fullchain.pem
pkey=/etc/coturn/certs/privkey.pem
no-tlsv1
no-tlsv1_1

no-multicast-peers
denied-peer-ip=0.0.0.0-0.255.255.255
denied-peer-ip=10.0.0.0-10.255.255.255
denied-peer-ip=100.64.0.0-100.127.255.255
denied-peer-ip=127.0.0.0-127.255.255.255
denied-peer-ip=169.254.0.0-169.254.255.255
denied-peer-ip=172.16.0.0-172.31.255.255
denied-peer-ip=192.0.0.0-192.0.0.255
denied-peer-ip=192.168.0.0-192.168.255.255
denied-peer-ip=198.18.0.0-198.19.255.255
denied-peer-ip=::1
denied-peer-ip=fc00::-fdff:ffff:ffff:ffff:ffff:ffff:ffff:ffff
denied-peer-ip=fe80::-febf:ffff:ffff:ffff:ffff:ffff:ffff:ffff

no-cli

user-quota=12
total-quota=1200
stale-nonce=600

pidfile=/var/run/turnserver-rest.pid
log-file=/var/log/coturn/turnserver-rest.log
simple-log
